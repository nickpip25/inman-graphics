      flex-wrap: wrap;

      border-radius: 8px;
      background: #f0f0ed;
      color: #666;

      margin-bottom: 20px;
    }

      color: #777;

      color: #888;

function fmtK(v) { return (v > 0 ? '+' : '') + v.toFixed(1) + 'K'; }
function fmtPct(v) { return (v > 0 ? '+' : '') + v.toFixed(1) + '%'; }

function valClass(v) {
  if (v == null) return '';
  if (v > 0) return 'pos';
  if (v < 0) return 'neg';
  return '';
}

function nfpMoMDisplay(d) {

  return { val: '—', cls: '' };

function unempClass(v) {

  if (v <= 3.0) return 'pos';
  return '';
}

function vsNational(v) {
  const diff = (v - 4.4);
  const dir = diff > 0.05 ? 'above' : diff < -0.05 ? 'below' : 'at';
  return dir + ' U.S. rate (4.4%)';
}

function buildHighlights(name, d) {
  const items = [];
  const diff = d.unemp - 4.4;
  const cmp = Math.abs(diff) < 0.05 ? 'at' : diff > 0 ? 'above' : 'below';
  const tone = diff > 0.5 ? 'neg' : diff < -0.5 ? 'pos' : 'neu';
  items.push({ dot: tone, text: d.unemp.toFixed(1) + '% unemployment — ' + cmp + ' the national rate of 4.4%' });

  if (d.nfpMoM != null) {
    items.push({ dot: valClass(d.nfpMoM) || 'neu', text: 'Nonfarm payrolls ' + (d.nfpMoM > 0 ? 'gained' : 'lost') + ' ' + Math.abs(d.nfpMoM).toFixed(1) + 'K jobs Jan \u2192 Feb (' + fmtPct(d.nfpMoMp) + ')' });
  } else if (d.nfpMoMp != null && d.nfpMoMp !== 0) {
    items.push({ dot: valClass(d.nfpMoMp) || 'neu', text: 'Nonfarm payrolls changed ' + fmtPct(d.nfpMoMp) + ' month-over-month' });
  }

  if (d.nfpYoY != null) {
    items.push({ dot: valClass(d.nfpYoY) || 'neu', text: 'Nonfarm payrolls ' + (d.nfpYoY > 0 ? 'up' : 'down') + ' ' + Math.abs(d.nfpYoY).toFixed(1) + 'K year-over-year (' + fmtPct(d.nfpYoYp) + ')' });
  } else if (d.nfpYoYp != null) {
    items.push({ dot: valClass(d.nfpYoYp) || 'neu', text: 'Nonfarm payrolls ' + (d.nfpYoYp > 0 ? 'grew' : 'declined') + ' ' + fmtPct(d.nfpYoYp) + ' year-over-year' });

  }

  if (d.conYoY != null) {
    items.push({ dot: valClass(d.conYoY) || 'neu', text: 'Construction jobs ' + (d.conYoY > 0 ? 'up' : 'down') + ' ' + Math.abs(d.conYoY).toFixed(1) + 'K year-over-year' });
  } else if (d.conYoYp != null) {
    items.push({ dot: valClass(d.conYoYp) || 'neu', text: 'Construction employment ' + (d.conYoYp > 0 ? 'grew' : 'declined') + ' ' + fmtPct(d.conYoYp) + ' year-over-year' });
  }

  if (items.length === 1) {
    items.push({ dot: 'neu', text: 'No statistically significant payroll changes reported for this state' });
  }
  return items;
}

function renderState(name) {
  const d = STATES[name];
  if (!d) return;
  placeholder.style.display = 'none';
  result.style.display = 'block';

  const nfpM = nfpMoMDisplay(d);
  const nfpY = nfpYoYDisplay(d);
  const conM = conMoMDisplay(d);
  const conY = conYoYDisplay(d);
  const highlights = buildHighlights(name, d);

  const hlHTML = highlights.map(h =>
    `<div class="hl-item"><div class="hl-dot ${h.dot}"></div><span>${h.text}</span></div>`
  ).join('');

  result.innerHTML = `
    <div class="state-header">
      <span class="state-name">${name}</span>
      <span class="state-badge">February 2026</span>
    </div>
    <div class="metric-grid">
      <div class="mcard">
        <div class="mcard-lbl">Unemployment rate</div>
        <div class="mcard-val ${unempClass(d.unemp)}">${d.unemp.toFixed(1)}%</div>
        <div class="mcard-sub">${vsNational(d.unemp)}</div>
      </div>
      <div class="mcard">
        <div class="mcard-lbl">Nonfarm payroll MoM</div>
        <div class="mcard-val ${nfpM.cls}">${nfpM.val}</div>
        <div class="mcard-sub">Jan &rarr; Feb change</div>
      </div>
      <div class="mcard">
        <div class="mcard-lbl">Nonfarm payroll YoY</div>
        <div class="mcard-val ${nfpY.cls}">${nfpY.val}</div>
        <div class="mcard-sub">Feb 2025 &rarr; Feb 2026</div>
      </div>
      <div class="mcard">
        <div class="mcard-lbl">Construction MoM</div>
        <div class="mcard-val ${conM.cls}">${conM.val}</div>
        <div class="mcard-sub">Jan &rarr; Feb change</div>
      </div>
      <div class="mcard">
        <div class="mcard-lbl">Construction YoY</div>
        <div class="mcard-val ${conY.cls}">${conY.val}</div>
        <div class="mcard-sub">Feb 2025 &rarr; Feb 2026</div>
      </div>
    </div>
    <div class="section-lbl">Key takeaways</div>
    <div class="highlight-list">${hlHTML}</div>
    <p class="footnote">&mdash; indicates no statistically significant change reported by BLS. Source: BLS State Employment &amp; Unemployment, released April 22, 2026.</p>
  `;
}

function showDropdown(q) {
  if (q.length < 1) { dropdown.style.display = 'none'; return; }
  const matches = stateNames.filter(s => s.toLowerCase().startsWith(q.toLowerCase()));
  if (matches.length === 0) { dropdown.style.display = 'none'; return; }
  focusIdx = -1;
  dropdown.innerHTML = matches.map(s => `<div class="dd-item" data-name="${s}">${s}</div>`).join('');
  dropdown.style.display = 'block';
  dropdown.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectState(el.dataset.name);
    });
  });
}

function selectState(name) {
  input.value = name;
  dropdown.style.display = 'none';
  renderState(name);
}

input.addEventListener('input', () => showDropdown(input.value));

input.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dd-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusIdx = Math.min(focusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusIdx = Math.max(focusIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === focusIdx));
  } else if (e.key === 'Enter' && focusIdx >= 0) {
    selectState(items[focusIdx].dataset.name);
  } else if (e.key === 'Escape') {
    dropdown.style.display = 'none';
  }
});

input.addEventListener('blur', () => setTimeout(() => { dropdown.style.display = 'none'; }, 150));
</script>
</body>
</html>
